<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyGlass Radar AI</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
body{margin:0;font-family:-apple-system;color:white;background:linear-gradient(#4e9cff,#2b1f68)}
.app{max-width:480px;margin:auto;padding:16px}
.temp{font-size:90px;text-align:center}
.card{background:rgba(255,255,255,.15);padding:14px;border-radius:20px;margin-top:12px;backdrop-filter:blur(20px)}
#map{height:300px;border-radius:20px}
button{padding:10px;margin:4px;border-radius:12px;border:none}
input{width:100%;padding:12px;border-radius:12px;border:none;margin-top:8px}
</style>
</head>
<body>
<div class="app">

<h2 id="city">Konum...</h2>
<div class="temp" id="temp">--°</div>
<div id="summary"></div>
<button onclick="initLocation()">Konum</button>

<div class="card">⚠️ <b>Akıllı Uyarı</b><br><span id="alert">Yükleniyor...</span></div>
<div class="card">🤖 <b>AI Hava Yorumu</b><br><span id="ai">Yükleniyor...</span></div>

<div class="card">
🤖 <b>SkyGlass AI Asistan</b><br>
<input id="question" placeholder="Bugün dışarı çıkılır mı?">
<button onclick="askAI()">Sor</button>
<p id="aiAnswer"></p>
</div>

<div class="card">
🌧️ Yağış: <span id="rain">--</span><br>
💨 Rüzgar: <span id="wind">--</span><br>
☀️ UV: <span id="uv">--</span>
</div>

<div class="card">
🗺️ Radar
<div id="map"></div>
<button onclick="prevFrame()">⏪</button>
<button onclick="toggle()">⏯</button>
<button onclick="nextFrame()">⏩</button>
<input type="range" id="timeline" min="0" value="0" oninput="setFrame(this.value)">
</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let map,layer,marker,frames=[],host="",i=0,play=true,timer;
let latestWeather=null;

function AI(c,d){
 let t=[];
 if(c.precipitation>0.2)t.push("Yağmur var, şemsiye al.");
 if(c.wind_speed_10m>25)t.push("Rüzgar kuvvetli, açık alanda dikkatli ol.");
 if(d.uv_index_max[0]>7)t.push("UV yüksek, güneşe dikkat.");
 if(c.temperature_2m>30)t.push("Hava sıcak, bol su iç.");
 if(!t.length)t.push("Hava genel olarak sakin görünüyor.");
 return t.join(" ");
}

async function load(lat,lon){
 const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,wind_speed_10m,precipitation&daily=uv_index_max&timezone=auto`);
 const d=await r.json();
 latestWeather=d;

 temp.innerText=Math.round(d.current.temperature_2m)+"°";
 rain.innerText=d.current.precipitation+" mm";
 wind.innerText=d.current.wind_speed_10m+" km/s";
 uv.innerText=d.daily.uv_index_max[0];
 ai.innerText=AI(d.current,d.daily);
 alert.innerText=d.current.precipitation>0.2 ? "Yağmur aktif" : "Kritik risk görünmüyor.";

 renderRadar(lat,lon);
}

async function renderRadar(lat,lon){
 if(!map){
  map=L.map('map').setView([lat,lon],7);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  marker=L.marker([lat,lon]).addTo(map);
 }
 const res=await fetch("https://api.rainviewer.com/public/weather-maps.json");
 const data=await res.json();
 host=data.host; frames=data.radar.past;
 timeline.max=frames.length-1;
 start();
}

function start(){
 function draw(){
  if(layer)map.removeLayer(layer);
  layer=L.tileLayer(`${host}${frames[i].path}/256/{z}/{x}/{y}/2/1_1.png`,{opacity:.65}).addTo(map);
  timeline.value=i;
  if(play)i=(i+1)%frames.length;
 }
 draw();
 clearInterval(timer);
 timer=setInterval(draw,700);
}

function toggle(){play=!play}
function nextFrame(){i=(i+1)%frames.length}
function prevFrame(){i=(i-1+frames.length)%frames.length}
function setFrame(v){i=parseInt(v)}

function askAI(){
 const q=question.value.toLowerCase();
 const r=rain.innerText, w=wind.innerText, u=uv.innerText, t=temp.innerText;

 if(q.includes("dışarı")||q.includes("çıkılır")){
  aiAnswer.innerText=`Şu an hava ${t}. Yağış ${r}, rüzgar ${w}. Kısa dış plan için uygun; yağış artarsa şemsiye al.`;
 }else if(q.includes("yağmur")){
  aiAnswer.innerText=`Yağış durumu ${r}. Radar animasyonunda koyu renkli alanlar yaklaşıyorsa yağmur ihtimali artıyor.`;
 }else if(q.includes("rüzgar")){
  aiAnswer.innerText=`Rüzgar şu an ${w}. 25 km/s üzeri açık alanda dikkat gerektirir.`;
 }else if(q.includes("uv")||q.includes("güneş")){
  aiAnswer.innerText=`UV değeri ${u}. 6 ve üzerindeyse öğle saatlerinde korunmanı öneririm.`;
 }else{
  aiAnswer.innerText=`Genel yorum: sıcaklık ${t}, yağış ${r}, rüzgar ${w}, UV ${u}. Radar ve uyarı kartını birlikte takip et.`;
 }
}

function initLocation(){
 navigator.geolocation.getCurrentPosition(p=>load(p.coords.latitude,p.coords.longitude));
}
initLocation();
</script>
</body>
</html>
